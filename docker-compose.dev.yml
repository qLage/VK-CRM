version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: crm-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_dev_password
      POSTGRES_DB: crm
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db_backup:/backup:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: crm-dev-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    image: node:20-alpine
    container_name: crm-dev-backend
    working_dir: /app
    restart: unless-stopped
    command: sh -c "apk add --no-cache python3 make g++ && npm install && npx tsx watch src/server.ts"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://crm_user:crm_dev_password@postgres:5432/crm
      REDIS_URL: redis://redis:6379
      FRONTEND_URL: http://localhost:8080
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: node:20-alpine
    container_name: crm-dev-frontend
    working_dir: /app
    restart: unless-stopped
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  pg_data:
  redis_data:
  backend_node_modules:
  frontend_node_modules:
