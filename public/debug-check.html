<!DOCTYPE html>
<html>
<head>
    <title>CRM Debug Check</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #fff; }
        .section { margin: 20px 0; padding: 15px; background: #2a2a2a; border-radius: 5px; }
        .good { color: #4ade80; }
        .bad { color: #f87171; }
        .warn { color: #fbbf24; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🔍 CRM Debug Check</h1>

    <div class="section">
        <h2>Service Worker Status</h2>
        <div id="sw-status">Checking...</div>
        <button onclick="unregisterSW()">Unregister Service Worker</button>
        <button onclick="clearCaches()">Clear All Caches</button>
    </div>

    <div class="section">
        <h2>Auth Status</h2>
        <div id="auth-status">Checking...</div>
    </div>

    <div class="section">
        <h2>Actions</h2>
        <button onclick="hardRefresh()">Hard Refresh (Ctrl+Shift+R)</button>
        <button onclick="window.location.href='/'">Go to Main App</button>
    </div>

    <script>
        async function checkServiceWorker() {
            const statusDiv = document.getElementById('sw-status');

            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();

                if (registrations.length > 0) {
                    statusDiv.innerHTML = `
                        <div class="warn">⚠️ Service Worker Active: ${registrations.length} registration(s)</div>
                        <div>This might be caching old code!</div>
                    `;

                    registrations.forEach((reg, i) => {
                        statusDiv.innerHTML += `<div>Registration ${i+1}: ${reg.scope}</div>`;
                    });
                } else {
                    statusDiv.innerHTML = '<div class="good">✅ No Service Worker registered</div>';
                }
            } else {
                statusDiv.innerHTML = '<div class="bad">❌ Service Worker not supported</div>';
            }
        }

        async function unregisterSW() {
            if ('serviceWorker' in navigator) {
                const registrations = await navigator.serviceWorker.getRegistrations();
                for (let reg of registrations) {
                    await reg.unregister();
                }
                alert('Service Worker unregistered! Now do a hard refresh (Ctrl+Shift+R)');
                checkServiceWorker();
            }
        }

        async function clearCaches() {
            if ('caches' in window) {
                const cacheNames = await caches.keys();
                await Promise.all(cacheNames.map(name => caches.delete(name)));
                alert(`Cleared ${cacheNames.length} cache(s)! Now do a hard refresh (Ctrl+Shift+R)`);
            }
        }

        function hardRefresh() {
            window.location.reload(true);
        }

        function checkAuth() {
            const token = localStorage.getItem('token');
            const authDiv = document.getElementById('auth-status');

            if (token) {
                try {
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    authDiv.innerHTML = `
                        <div class="good">✅ Logged in</div>
                        <div>User ID: ${payload.id}</div>
                        <div>Access Level: ${payload.access_level}</div>
                        <div>Email: ${payload.email}</div>
                    `;
                } catch (e) {
                    authDiv.innerHTML = '<div class="bad">❌ Invalid token</div>';
                }
            } else {
                authDiv.innerHTML = '<div class="bad">❌ Not logged in</div>';
            }
        }

        // Run checks on load
        checkServiceWorker();
        checkAuth();
    </script>
</body>
</html>
