resolver 127.0.0.11 valid=30s;

# Default server — catches direct IP access and any unmatched hostnames
server {
    client_max_body_size 200M;
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/vkrysha-crm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vkrysha-crm.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    charset utf-8;
    charset_types text/html text/css text/plain text/javascript application/javascript application/json text/xml application/xml;

    # Hashed bundles: long cache (filenames change each build)
    location ^~ /assets/ {
        root /usr/share/nginx/html;
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # PWA files — never cache (SW must always be fresh)
    location ~* ^/(service-worker\.js|sw-push\.js|sw\.js|sw\.mjs)$ {
        root /usr/share/nginx/html;
        default_type application/javascript;
        etag off;
        if_modified_since off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        default_type application/manifest+json;
        etag off;
        if_modified_since off;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # SPA: never cache HTML shell — many clients request "/" not "/index.html", so only
    # location = /index.html was not enough and they kept an old JS entry forever.
    # etag off: stops 304 + stale shell when proxies misbehave; pair with no-store.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
        etag off;
        if_modified_since off;
        add_header Cache-Control "no-cache, no-store, must-revalidate, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
    }

    # Exact match for index.html fallback — force UTF-8 charset
    location = /index.html {
        root /usr/share/nginx/html;
        etag off;
        if_modified_since off;
        add_header Content-Type "text/html; charset=utf-8" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate, private" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header Surrogate-Control "no-store" always;
    }

    location /api {
        set $backend_upstream http://backend:5000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (Server-Sent Events) — disable buffering and compression
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_set_header X-Accel-Buffering no;
        gzip off;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # WebSocket
    location /ws {
        set $backend_upstream http://backend:5000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Socket.io (backward compatibility)
    location /socket.io {
        set $backend_upstream http://backend:5000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}

# HTTP → HTTPS redirect for domain
server {
    listen 80;
    server_name vkrysha-crm.ru www.vkrysha-crm.ru;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Force redirect to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS for domain
server {
    client_max_body_size 200M;
    listen 443 ssl;
    server_name vkrysha-crm.ru www.vkrysha-crm.ru;

    ssl_certificate /etc/letsencrypt/live/vkrysha-crm.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vkrysha-crm.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    charset utf-8;
    charset_types text/html text/css text/plain text/javascript application/javascript application/json text/xml application/xml;

    # Hashed bundles: long cache (filenames change each build)
